<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-label="Hash chain integrity">
  <defs>
    <marker id="link" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="720" height="160" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="360" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#334155">Tamper-evident event chain</text>
  <g font-family="ui-monospace,monospace" font-size="11">
    <rect x="40" y="56" width="140" height="64" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
    <text x="110" y="78" text-anchor="middle" font-weight="600" fill="#0f766e">event #1</text>
    <text x="110" y="96" text-anchor="middle" fill="#64748b">session.started</text>
    <text x="110" y="112" text-anchor="middle" fill="#94a3b8" font-size="9">hash: a3f9&</text>

    <rect x="210" y="56" width="140" height="64" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
    <text x="280" y="78" text-anchor="middle" font-weight="600" fill="#0f766e">event #2</text>
    <text x="280" y="96" text-anchor="middle" fill="#64748b">command.finished</text>
    <text x="280" y="112" text-anchor="middle" fill="#94a3b8" font-size="9">prev ’ a3f9&</text>

    <rect x="380" y="56" width="140" height="64" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
    <text x="450" y="78" text-anchor="middle" font-weight="600" fill="#0f766e">event #3</text>
    <text x="450" y="96" text-anchor="middle" fill="#64748b">git.snapshot</text>
    <text x="450" y="112" text-anchor="middle" fill="#94a3b8" font-size="9">prev ’ 8c21&</text>

    <rect x="550" y="56" width="130" height="64" rx="10" fill="#ecfdf5" stroke="#0d9488" stroke-width="2"/>
    <text x="615" y="78" text-anchor="middle" font-weight="600" fill="#0f766e">manifest</text>
    <text x="615" y="96" text-anchor="middle" fill="#64748b">Ed25519 sig</text>
    <text x="615" y="112" text-anchor="middle" fill="#94a3b8" font-size="9">bundle.zip</text>
  </g>
  <g stroke="#64748b" stroke-width="1.5" marker-end="url(#link)" fill="none">
    <path d="M180 88 L210 88"/>
    <path d="M350 88 L380 88"/>
    <path d="M520 88 L550 88"/>
  </g>
  <text x="360" y="144" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Edit any event ’ chain breaks ’ verify fails</text>
</svg>
