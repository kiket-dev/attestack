<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-label="Hash chain integrity">
  <defs>
    <marker id="chain-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b9cb3"/>
    </marker>
  </defs>

  <rect width="720" height="180" rx="16" fill="#121820" stroke="#2a3544"/>
  <text x="360" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">
    Tamper-evident event chain
  </text>

  <g font-family="ui-monospace,monospace" font-size="11">
    <rect x="32" y="56" width="132" height="64" rx="10" fill="#1e293b" stroke="#3dd68c" stroke-width="1.5"/>
    <text x="98" y="78" text-anchor="middle" font-weight="600" fill="#3dd68c">event #1</text>
    <text x="98" y="96" text-anchor="middle" fill="#8b9cb3">session.started</text>
    <text x="98" y="112" text-anchor="middle" fill="#5a6b82" font-size="9">hash: a3f9…</text>

    <rect x="196" y="56" width="132" height="64" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="262" y="78" text-anchor="middle" font-weight="600" fill="#e6edf3">event #2</text>
    <text x="262" y="96" text-anchor="middle" fill="#8b9cb3">command.finished</text>
    <text x="262" y="112" text-anchor="middle" fill="#5a6b82" font-size="9">prev &#8594; a3f9…</text>

    <rect x="360" y="56" width="132" height="64" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="426" y="78" text-anchor="middle" font-weight="600" fill="#e6edf3">event #3</text>
    <text x="426" y="96" text-anchor="middle" fill="#8b9cb3">git.snapshot</text>
    <text x="426" y="112" text-anchor="middle" fill="#5a6b82" font-size="9">prev &#8594; 8c21…</text>

    <rect x="524" y="56" width="164" height="64" rx="10" fill="#0f2a22" stroke="#3dd68c" stroke-width="1.5"/>
    <text x="606" y="78" text-anchor="middle" font-weight="600" fill="#3dd68c">manifest</text>
    <text x="606" y="96" text-anchor="middle" fill="#8b9cb3">Ed25519 sig</text>
    <text x="606" y="112" text-anchor="middle" fill="#5a6b82" font-size="9">bundle.zip</text>
  </g>

  <g stroke="#8b9cb3" stroke-width="2" marker-end="url(#chain-arrow)" fill="none">
    <path d="M164 88 H196"/>
    <path d="M328 88 H360"/>
    <path d="M492 88 H524"/>
  </g>

  <text x="360" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b9cb3">
    Edit any event &#8594; chain breaks &#8594; verify fails
  </text>
</svg>
