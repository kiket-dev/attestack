<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Attestack session loop: start, record, export, verify">
  <defs>
    <linearGradient id="loop-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3dd68c"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <marker id="loop-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 4, 0 8" fill="#3dd68c"/>
    </marker>
    <filter id="loop-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3dd68c" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="720" height="200" rx="16" fill="#121820" stroke="#2a3544"/>

  <g font-family="system-ui,sans-serif">
    <rect x="24" y="64" width="130" height="72" rx="10" fill="#1e293b" stroke="#3dd68c" stroke-width="1.5" filter="url(#loop-glow)"/>
    <text x="89" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#3dd68c">start</text>
    <text x="89" y="116" text-anchor="middle" font-size="11" fill="#8b9cb3">open session</text>

    <rect x="194" y="64" width="130" height="72" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="259" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">record</text>
    <text x="259" y="116" text-anchor="middle" font-size="11" fill="#8b9cb3">run · note · agent</text>

    <rect x="364" y="64" width="130" height="72" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="429" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">export</text>
    <text x="429" y="116" text-anchor="middle" font-size="11" fill="#8b9cb3">signed bundle</text>

    <rect x="534" y="64" width="130" height="72" rx="10" fill="#1e293b" stroke="#3dd68c" stroke-width="1.5" filter="url(#loop-glow)"/>
    <text x="599" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#3dd68c">verify</text>
    <text x="599" y="116" text-anchor="middle" font-size="11" fill="#8b9cb3">offline · strict</text>
  </g>

  <g stroke="url(#loop-accent)" stroke-width="2.5" marker-end="url(#loop-arrow)" fill="none">
    <path d="M154 100 H190">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M324 100 H360">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M494 100 H530">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
