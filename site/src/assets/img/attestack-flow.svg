<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" role="img" aria-label="Attestack session to bundle flow">
  <defs>
    <linearGradient id="flow-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3dd68c"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <marker id="flow-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3dd68c"/>
    </marker>
    <filter id="flow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3dd68c" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="800" height="220" rx="16" fill="#121820" stroke="#2a3544"/>

  <text x="400" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">
    One session, one verifiable timeline
  </text>

  <g font-family="system-ui,sans-serif">
    <g filter="url(#flow-glow)">
      <rect x="24" y="72" width="96" height="68" rx="12" fill="#1e293b" stroke="#3dd68c" stroke-width="1.5"/>
      <text x="72" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#3dd68c">start</text>
      <text x="72" y="118" text-anchor="middle" font-size="10" fill="#8b9cb3">open session</text>
    </g>
    <g>
      <rect x="144" y="72" width="96" height="68" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="192" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#e6edf3">run</text>
      <text x="192" y="118" text-anchor="middle" font-size="10" fill="#8b9cb3">commands</text>
    </g>
    <g>
      <rect x="264" y="72" width="96" height="68" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="312" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#e6edf3">note</text>
      <text x="312" y="118" text-anchor="middle" font-size="10" fill="#8b9cb3">human context</text>
    </g>
    <g>
      <rect x="384" y="72" width="96" height="68" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="432" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#e6edf3">agent</text>
      <text x="432" y="118" text-anchor="middle" font-size="10" fill="#8b9cb3">tool calls</text>
    </g>
    <g>
      <rect x="504" y="72" width="96" height="68" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="552" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#e6edf3">stop</text>
      <text x="552" y="118" text-anchor="middle" font-size="10" fill="#8b9cb3">seal log</text>
    </g>
    <rect x="636" y="64" width="140" height="84" rx="12" fill="url(#flow-accent)"/>
    <text x="706" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#06080c">bundle.zip</text>
    <text x="706" y="118" text-anchor="middle" font-size="10" fill="#06080c">signed export</text>
    <text x="706" y="134" text-anchor="middle" font-size="10" fill="#06080c">verify offline</text>
  </g>

  <g stroke="#3dd68c" stroke-width="2" marker-end="url(#flow-arrow)" fill="none">
    <path d="M120 106 H144"/>
    <path d="M240 106 H264"/>
    <path d="M360 106 H384"/>
    <path d="M480 106 H504"/>
    <path d="M600 106 H636"/>
  </g>

  <rect x="48" y="168" width="704" height="32" rx="8" fill="#0a0e14" stroke="#2a3544"/>
  <text x="400" y="189" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#8b9cb3">
    .attestack/sessions/{id}/events.jsonl &#8594; hash-chained append-only log
  </text>
</svg>
