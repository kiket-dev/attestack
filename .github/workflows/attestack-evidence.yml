name: Attestack CI evidence

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build attestack
        run: cargo build --release -p attestack-cli

      - name: Record CI session
        run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          attestack ci start --json
          attestack ci run -- cargo test --workspace
          attestack ci finish --json

      - name: Verify bundle
        run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          BUNDLE="$(ls .attestack/bundles/*.attestack.zip | tail -1)"
          attestack verify "$BUNDLE" --json

      - name: PR summary preview
        run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          BUNDLE="$(ls .attestack/bundles/*.attestack.zip | tail -1)"
          attestack pr-summary --bundle "$BUNDLE"

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: attestack-evidence
          path: .attestack/bundles/*.attestack.zip
          if-no-files-found: error

      - name: Write PR evidence summary
        if: github.event_name == 'pull_request'
        run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          BUNDLE="$(ls .attestack/bundles/*.attestack.zip | tail -1)"
          {
            echo "<!-- attestack-evidence -->"
            attestack pr-summary --bundle "$BUNDLE"
          } > pr-summary.md

      - name: Post PR evidence comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body-includes: "<!-- attestack-evidence -->"
          body-path: pr-summary.md
